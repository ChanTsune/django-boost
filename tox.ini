[tox]
envlist = flake8
skipsdist = true

[testenv:flake8]
deps =
    flake8
    flake8-blind-except
    flake8-docstrings
    flake8-import-order

commands = flake8 .

[flake8]
exclude =
    .git,
    .tox,
    .vscode,
    __pycache__,
    build,
    dist,
    migrations,
    *.pyc,
    *.egg-info,
    example/*,
    config/*,
    tests/*,
    docs/*,
    manage.py,
    setup.py,
    test.py,
max-line-length = 119
