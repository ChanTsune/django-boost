name: Test

on:
  push:
  pull_request:
    branches:
    - master

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
        - python-version: '3.10.x'
          django-version: '4.2.*'
        - python-version: '3.11.x'
          django-version: '4.2.*'
        - python-version: '3.12.x'
          django-version: '4.2.*'
        - python-version: '3.10.x'
          django-version: '5.0.*'
        - python-version: '3.11.x'
          django-version: '5.0.*'
        - python-version: '3.12.x'
          django-version: '5.0.*'
        - python-version: '3.10.x'
          django-version: '5.1.*'
        - python-version: '3.11.x'
          django-version: '5.1.*'
        - python-version: '3.12.x'
          django-version: '5.1.*'
        - python-version: '3.13.x'
          django-version: '5.1.*'
        - python-version: '3.10.x'
          django-version: '5.2.*'
        - python-version: '3.11.x'
          django-version: '5.2.*'
        - python-version: '3.12.x'
          django-version: '5.2.*'
        - python-version: '3.13.x'
          django-version: '5.2.*'
    runs-on: ubuntu-latest
    env:
      DJANGO_VERSION: ${{ matrix.django-version }}
    steps:
    - uses: actions/checkout@v7
    - name: 'Set up Python ${{ matrix.python-version }}'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: "requirements/ci.txt"
    - name: Install dependencies
      run: |
        pip install -U pip
        pip install -r requirements/ci.txt
        pip install django==$DJANGO_VERSION
        pip install .
    - name: Check migrations
      run: |
        python manage.py makemigrations django_boost --check --dry-run
    - name: Tox
      run: |
        tox
    - name: Test
      run: |
        coverage run --parallel-mode manage.py test
    - name: Upload coverage data
      uses: actions/upload-artifact@v7
      with:
        name: coverage-data-${{ strategy.job-index }}
        path: .coverage.*
        include-hidden-files: true
        if-no-files-found: error

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.x'
    - name: Install coverage
      run: |
        pip install -U pip
        pip install coverage
    - name: Download coverage data
      uses: actions/download-artifact@v8
      with:
        pattern: coverage-data-*
        merge-multiple: true
    - name: Combine and report
      run: |
        coverage combine
        coverage report
        coverage xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false

  typecheck:
    # No continue-on-error: a broken setup or a typed-module regression should
    # surface red here (the mypy.ini allowlist keeps the baseline green, so red
    # is meaningful). A single django-stubs release can't span Django 4.2..5.2,
    # so each cell pins its own (mypy, django-stubs) pair.
    strategy:
      fail-fast: false
      matrix:
        include:
        - django-version: '5.2.*'
          mypy-version: '2.1.0'
          stubs-version: '6.0.6'
        - django-version: '4.2.*'
          mypy-version: '1.15.0'
          stubs-version: '5.1.3'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.x'
    - name: Install dependencies
      run: |
        pip install -U pip
        pip install "mypy==${{ matrix.mypy-version }}" "django-stubs[compatible-mypy]==${{ matrix.stubs-version }}" "django-stubs-ext==${{ matrix.stubs-version }}"
        pip install "django==${{ matrix.django-version }}"
        pip install -e .
    - name: Mypy
      run: mypy django_boost example
