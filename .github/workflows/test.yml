name: Test

on:
  push:
  pull_request:
    branches:
    - master

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
        - python-version: '3.10.x'
          django-version: '4.2.*'
        - python-version: '3.11.x'
          django-version: '4.2.*'
        - python-version: '3.12.x'
          django-version: '4.2.*'
        - python-version: '3.10.x'
          django-version: '5.0.*'
        - python-version: '3.11.x'
          django-version: '5.0.*'
        - python-version: '3.12.x'
          django-version: '5.0.*'
        - python-version: '3.10.x'
          django-version: '5.1.*'
        - python-version: '3.11.x'
          django-version: '5.1.*'
        - python-version: '3.12.x'
          django-version: '5.1.*'
        - python-version: '3.13.x'
          django-version: '5.1.*'
        - python-version: '3.10.x'
          django-version: '5.2.*'
        - python-version: '3.11.x'
          django-version: '5.2.*'
        - python-version: '3.12.x'
          django-version: '5.2.*'
        - python-version: '3.13.x'
          django-version: '5.2.*'
    runs-on: ubuntu-latest
    env:
      DJANGO_VERSION: ${{ matrix.django-version }}
    steps:
    - uses: actions/checkout@v4
    - name: 'Set up Python ${{ matrix.python-version }}'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: "requirements/ci.txt"
    - name: Install dependencies
      run: |
        pip install -U pip
        pip install -r requirements/ci.txt
        pip install django==$DJANGO_VERSION
        pip install .
    - name: Tox
      run: |
        tox
    - name: Test
      run: |
        coverage run manage.py test
    - name: Report
      run: |
        coverage report
    - name: codecov
      run: |
        codecov
