disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_return_any = True

[mypy-django_boost.utils.html]
ignore_errors = False
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_return_any = True

[mypy-django_boost.utils.functions.loop]
ignore_errors = False
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_return_any = True

[mypy-django_boost.utils]
