{% extends 'base/html.html' %}

{% block title %}Edit customer | django-boost sample{% endblock title %}

{% block body %}
<section class="page-title">
    <h1>Edit customer</h1>
    <p>This route uses <code>RedirectToDetailMixin</code> after a successful update.</p>
</section>

<section class="section panel">
    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Save customer">
    </form>
</section>

{% endblock body %}
