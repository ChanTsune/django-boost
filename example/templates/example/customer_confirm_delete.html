{% extends 'base/html.html' %}

{% block title %}Delete customer | django-boost sample{% endblock title %}

{% block body %}
<section class="page-title">
    <h1>Delete customer</h1>
    <p>Generated delete route from <code>ModelCRUDViews</code>.</p>
</section>

<section class="section panel">
    <form action="" method="post">
        {% csrf_token %}
        <p>Delete <strong>{{ object.name }}</strong>?</p>
        <div class="actions">
            <input type="submit" value="Delete customer">
            <a class="button" href="/views/{{ object.pk }}/">Cancel</a>
        </div>
    </form>
</section>

{% endblock body %}
